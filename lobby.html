<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>游戏大厅 · Game Hall</title>
    <meta name="description" content="精品卡牌游戏大厅，畅玩21点和斗地主。" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;700;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="lobby.css" />
</head>

<body>
    <!-- Background -->
    <div class="lobby-bg"></div>
    <div class="vignette"></div>
    <!-- Floating particles -->
    <div class="particles" id="particles"></div>

    <!-- Main container -->
    <div class="lobby-container">

        <!-- Header -->
        <header class="lobby-header">
            <div class="header-deco left">♠ ♣</div>
            <div class="header-center">
                <div class="crown-icon">♛</div>
                <h1 class="lobby-title">游戏大厅</h1>
                <p class="lobby-subtitle">GAME HALL · PREMIUM CARD GAMES</p>
            </div>
            <div class="header-deco right">♥ ♦</div>
        </header>

        <!-- Tagline -->
        <p class="tagline">选择你的牌局，开始对决</p>

        <!-- Games Grid -->
        <section class="games-grid" aria-label="游戏列表">

            <!-- 21点 -->
            <article class="game-card" id="card-blackjack" onclick="enterGame('index.html')" tabindex="0" role="button"
                aria-label="进入21点游戏">
                <div class="card-glow glow-green"></div>
                <div class="card-image-wrap">
                    <img src="assets/blackjack_cover.png" alt="21点 Blackjack 游戏封面" class="card-image" />
                    <div class="card-image-overlay"></div>
                    <div class="play-badge">
                        <span class="play-icon">▶</span>
                        <span>立即游玩</span>
                    </div>
                </div>
                <div class="card-info">
                    <div class="card-tags">
                        <span class="tag tag-hot">🔥 热门</span>
                        <span class="tag tag-players">1人</span>
                    </div>
                    <h2 class="card-title">21 点</h2>
                    <p class="card-subtitle">BLACKJACK</p>
                    <p class="card-desc">与庄家对决，手牌点数最接近 21 点者获胜。支持下注、加倍、Blackjack 1.5倍赔率。</p>
                    <div class="card-footer">
                        <div class="card-stats">
                            <span class="stat">🎰 筹码竞技</span>
                            <span class="stat">⚡ 快节奏</span>
                        </div>
                        <button class="play-btn btn-green">开始游戏 →</button>
                    </div>
                </div>
            </article>

            <!-- 斗地主 -->
            <article class="game-card" id="card-doudizhu" onclick="enterGame('doudizhu.html')" tabindex="0"
                role="button" aria-label="进入斗地主游戏">
                <div class="card-glow glow-red"></div>
                <div class="card-image-wrap">
                    <img src="assets/doudizhu_cover.png" alt="斗地主游戏封面" class="card-image" />
                    <div class="card-image-overlay"></div>
                    <div class="play-badge">
                        <span class="play-icon">▶</span>
                        <span>立即游玩</span>
                    </div>
                </div>
                <div class="card-info">
                    <div class="card-tags">
                        <span class="tag tag-new">✨ 新上线</span>
                        <span class="tag tag-players">3人</span>
                    </div>
                    <h2 class="card-title">斗地主</h2>
                    <p class="card-subtitle">LANDLORD</p>
                    <p class="card-desc">经典中国牌类游戏，与两位AI对决。叫地主、打炸弹，用王炸终结一切！</p>
                    <div class="card-footer">
                        <div class="card-stats">
                            <span class="stat">🤖 AI 玩家</span>
                            <span class="stat">💥 炸弹系统</span>
                        </div>
                        <button class="play-btn btn-red">开始游戏 →</button>
                    </div>
                </div>
            </article>

        </section>

        <!-- Footer -->
        <footer class="lobby-footer">
            <div class="footer-suits">♠ ♣ ♥ ♦</div>
            <p>精品卡牌游戏体验 · Premium Card Gaming</p>
        </footer>

    </div>

    <script>
        // Enter game with transition animation
        function enterGame(url) {
            const overlay = document.createElement('div');
            overlay.style.cssText = `
                position:fixed;inset:0;background:#000;opacity:0;z-index:9999;
                transition:opacity 0.5s ease;pointer-events:none;
            `;
            document.body.appendChild(overlay);
            requestAnimationFrame(() => {
                overlay.style.opacity = '1';
                setTimeout(() => { window.location.href = url; }, 500);
            });
        }

        // Keyboard support
        document.querySelectorAll('.game-card').forEach(card => {
            card.addEventListener('keydown', e => {
                if (e.key === 'Enter' || e.key === ' ') card.click();
            });
        });

        // Generate floating particles
        const container = document.getElementById('particles');
        const symbols = ['♠', '♣', '♥', '♦', '🃏'];
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.textContent = symbols[Math.floor(Math.random() * symbols.length)];
            p.style.cssText = `
                left: ${Math.random() * 100}%;
                animation-delay: ${Math.random() * 8}s;
                animation-duration: ${6 + Math.random() * 8}s;
                font-size: ${0.8 + Math.random() * 1.2}rem;
                opacity: ${0.05 + Math.random() * 0.15};
            `;
            container.appendChild(p);
        }
    </script>
</body>

</html>
